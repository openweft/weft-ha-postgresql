name: ci

# Build + test on push to main and on PRs.
# Artifact publishing lives in release.yml, triggered only by workflow_dispatch
# or a v* tag (openweft no-autopublish-dev rule).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - run: go vet ./...
      - run: go test ./... -race

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
      - name: linux/arm64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -trimpath -ldflags '-s -w' -o /tmp/weft-ha-postgresql-arm64 ./cmd/weft-ha-postgresql
      - name: linux/amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -trimpath -ldflags '-s -w' -o /tmp/weft-ha-postgresql-amd64 ./cmd/weft-ha-postgresql
